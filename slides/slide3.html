<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>キャットオセロ - スライド3</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #4a148c, #1a237e);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      overflow: hidden;
    }
    .slide {
      width: 800px;
      height: 450px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    h2 {
      font-size: 36px;
      margin-bottom: 30px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }
    .cta {
      margin-top: 40px;
      font-size: 24px;
    }
    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 30px;
      background: linear-gradient(to right, #4CAF50, #2E7D32);
      border-radius: 50px;
      font-size: 20px;
      font-weight: bold;
      text-decoration: none;
      color: white;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
    }
    .button:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
    }
    .url {
      margin-top: 30px;
      font-size: 18px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="slide">
    <h2>今すぐプレイ！</h2>
    <div class="cta">友達と一緒に楽しめる<br>キャットオセロゲーム</div>
    <a href="https://ninja03.github.io/devin2/" class="button">ゲームを始める</a>
    <div class="url">https://ninja03.github.io/devin2/</div>
  </div>
</body>
</html>
