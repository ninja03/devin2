<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>キャットオセロ - スライド2</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #4a148c, #1a237e);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      overflow: hidden;
    }
    .slide {
      width: 800px;
      height: 450px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    h2 {
      font-size: 36px;
      margin-bottom: 30px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }
    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      text-align: left;
      width: 100%;
    }
    .feature {
      display: flex;
      align-items: center;
      font-size: 20px;
      margin-bottom: 15px;
    }
    .feature-icon {
      font-size: 28px;
      margin-right: 15px;
      min-width: 40px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="slide">
    <h2>ゲームの特徴</h2>
    <div class="features">
      <div class="feature">
        <div class="feature-icon">🐱</div>
        <div>猫の絵文字を使った駒</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🎮</div>
        <div>完全なオセロルール</div>
      </div>
      <div class="feature">
        <div class="feature-icon">✨</div>
        <div>美しい3Dエフェクト</div>
      </div>
      <div class="feature">
        <div class="feature-icon">📱</div>
        <div>レスポンシブデザイン</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🔄</div>
        <div>スムーズなアニメーション</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🏆</div>
        <div>スコア追跡機能</div>
      </div>
    </div>
  </div>
</body>
</html>
