<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>キャットオセロ - スライド1</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #4a148c, #1a237e);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      overflow: hidden;
    }
    .slide {
      width: 800px;
      height: 450px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }
    .cats {
      font-size: 72px;
      margin: 30px 0;
      display: flex;
      gap: 20px;
    }
    .subtitle {
      font-size: 24px;
      opacity: 0.8;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="slide">
    <h1>3D キャットオセロ</h1>
    <div class="cats">
      <div>🐈‍⬛</div>
      <div>🐈</div>
    </div>
    <div class="subtitle">猫の絵文字を使った新感覚オセロゲーム</div>
  </div>
</body>
</html>
